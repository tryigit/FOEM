name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev libudev-dev

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --bin foem --release

      - name: Decode code signing certificate (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "foem_signing.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String("${{ secrets.CERT_BASE64 }}"))
          Write-Host "Certificate decoded to $certPath"

      - name: Sign Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "foem_signing.pfx"
          $exePath = "target/release/foem.exe"
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -First 1).FullName
          & $signtool sign /f $certPath /p "${{ secrets.CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath

      - name: Cleanup certificate
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "foem_signing.pfx"
          if (Test-Path $certPath) { Remove-Item -Force $certPath }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: foem-${{ matrix.os }}
          path: |
            target/release/foem
            target/release/foem.exe
